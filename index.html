<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Login Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
   <img src="./GitHub-Logo.png" alt="GitHub Logo" class="logo">

    <h1>Sign in toGitHub</h1>

    <div class="login-box">
        <label>Username or email address</label>
        <input type="text">

        <div class="password">
            <label>Password</label>
            <a href="#">Forgot password?</a>
        </div>

        <input type="password">

        <button>Sign in</button>
    </div>

    <div class="signup-box">
        New to GitHub?
        <a href="./create.html">Create an account</a>
    </div>
    <div class="end">
        <a href="#">Terms</a>
        <a href="#">   Privacy</a>
         <a href="#"  >Security</a>
         <a href="#">  contact GitHub</a>

</div>

</body>
</html>
